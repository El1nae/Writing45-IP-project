<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔金公司 - 节日庆典礼品</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background-color: #f5f5f5;
            font-family: "Microsoft Yahei",SimSun,sans-serif;
            color: #333;
            line-height: 1.8;
        }

        /* ========== 全新页眉区域（只改这里） ========== */
        /* 最顶部白边 */
        .top-white-bar{
            width: 100%;
            height: 16px;
            background-color: #d6336c;
        }
        /* 顶部导航栏 */
        .top-nav{
            width: 100%;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        /* 左侧公司名 */
        .brand-name{
            font-size: 28px;
            font-weight: 900;
            color: #d6336c;
            text-decoration: none;
        }
        /* 礼品行业导航 */
        .nav-menu{
            display: flex;
            gap: 32px;
        }
        .nav-menu a{
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: color 0.2s ease;
        }
        .nav-menu a:hover{color:#d6336c;}
        /* 右上角登录注册 */
        .auth-btn-group{
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .sign-in{
            text-decoration: none;
            color: #333;
            font-size: 16px;
        }
        .sign-up{
            background-color: #d6336c;
            color: white;
            padding: 9px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 16px;
            box-shadow: 0 6px 14px rgba(214,51,108,0.24);
        }
        /* 自定义页眉大图 */
        .header{
            width: 100%;
            height: 320px;
            background: url("WR45_headerimage.png") no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 居中搜索框 */
        .search-box{
            width: 65%;
            max-width: 800px;
        }
        .search-input{
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 32px;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            outline: none;
        }

        /* ========== 下方主体内容 100% 原样保留 完全不变 ========== */
        .container{
            width:90%;
            max-width:1000px;
            margin:30px auto;
            display:flex;
            gap:25px;
        }
        .main{flex:3;}
        .article{
            background:#fff;
            padding:25px;
            margin-bottom:20px;
            border-radius:4px;
            box-shadow:0 2px 5px #ddd;
        }
        .article h2{
            color:#222;
            margin-bottom:10px;
            font-size:24px;
        }
        .info{
            color:#999;
            font-size:14px;
            margin-bottom:15px;
        }
        .article p{
            color:#444;
            font-size:18px;
            margin-bottom:15px;
        }
        .read{
            display:inline-block;
            color:#3498db;
            text-decoration:none;
            font-size:17px;
        }

        /* 侧边栏 完全还原截图 */
        .sidebar{flex:1;}
        .side-box{
            background:#fff;
            padding:20px;
            margin-bottom:20px;
            border-radius:4px;
            box-shadow:0 2px 5px #ddd;
        }
        .side-box h3{
            border-left:4px solid #3498db;
            padding-left:10px;
            margin-bottom:15px;
            font-size:20px;
        }
        .side-box ul{list-style:none;padding-left:0;}
        .side-box li{margin:8px 0;font-size:17px;}
        .side-box a{
            color:#555;
            text-decoration:none;
        }
        .side-box a:hover{color:#3498db;}

        /* 页脚 */
        .footer{
            text-align:center;
            padding:25px 0;
            color:#999;
            font-size:14px;
            background:#2c3e50;
            color:#ccc;
            margin-top:30px;
        }

        /* 移动端适配 */
        @media(max-width:768px){
            .top-nav{padding:12px 15px;flex-wrap:wrap;gap:10px;}
            .nav-menu{gap:12px;}
            .header{height:220px;}
            .search-box{width:90%;}
            .container{flex-direction:column;}
        }
    </style>
</head>
<body>

<!-- 1. 顶部白边 -->
<div class="top-white-bar"></div>

    <div class="auth-btn-group">
        <a href="signup.html" target="_blank" class="sign-up">Sign up</a>
        <a href="signin.html" target="_blank" class="sign-in">Sign in</a>
    </div>
</div>

    <div class="search-box">
        <input type="text" class="search-input" placeholder="搜索节日礼物、庆典好物...">

    <div class="main">
        <div class="article">
            <h2>遇见生活里的小美好</h2>

        </div>
    </div>

    <!-- 侧边栏 完全还原 -->
    <div class="sidebar">
        <div class="side-box">
            <h3>博主简介</h3>
            <p>热爱生活，喜欢文字，闲暇之余记录日常点滴，分享所见所闻所想。</p>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 魔金公司 版权所有</p>
</div>

</body>
</html>
